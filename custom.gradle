repositories {
    flatDir {
        dirs 'libs'
    }

    maven { url = "https://raw.githubusercontent.com/Fuzss/modresources/main/maven/" }
    maven { url = "https://maven.createmod.net" }
}

dependencies {
    def localLibs = fileTree(dir: 'libs', include: ['*.jar'])

    compileOnly localLibs
    runtimeOnly localLibs
}
